# ─────────────────────────────────────────────────────────────────────────────
# infra/lightsail/nginx-docker.conf
#
# Nginx config used INSIDE the nginx Docker container.
# Mounted as /etc/nginx/nginx.conf via docker-compose volume.
#
# Routing:
#   /api/*   → api container on port 3000
#   /*       → web container on port 3001
#
# CloudFront sits in front and terminates HTTPS.
# Nginx only handles HTTP on port 80 (CloudFront → Nginx → containers).
#
# All app containers are on the same Docker bridge network and are
# reachable by their service names (api, web).
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format includes CloudFront forwarded IP
    log_format main '$http_x_forwarded_for - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Increase body size for CSV uploads (up to 50 MB)
    client_max_body_size 50M;

    # Upstream definitions (Docker service names resolve via internal DNS)
    upstream api_upstream {
        server api:3000;
        keepalive 32;
    }

    upstream web_upstream {
        server web:3001;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Trust CloudFront as the real client IP source
        real_ip_header    X-Forwarded-For;
        set_real_ip_from  0.0.0.0/0;

        # Security headers
        add_header X-Frame-Options         "SAMEORIGIN"   always;
        add_header X-Content-Type-Options  "nosniff"      always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── API routes ──────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection     "";
            proxy_set_header   Host           $host;
            proxy_set_header   X-Real-IP      $remote_addr;
            proxy_set_header   X-Forwarded-For $http_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Health check endpoint (used by CloudFront origin health check) ──
        location /health {
            proxy_pass         http://api_upstream/health;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            access_log off;
        }

        # ── Next.js static assets — long cache ──────────────────────────────
        location /_next/static/ {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            # CloudFront will cache these; tell it they are immutable
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── All other routes → Next.js web ──────────────────────────────────
        location / {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $http_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 60s;
        }
    }
}
