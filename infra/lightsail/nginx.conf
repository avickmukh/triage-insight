# ─────────────────────────────────────────────────────────────────────────────
# infra/lightsail/nginx.conf
#
# Nginx reverse proxy for the Lightsail instance.
# Place at: /etc/nginx/sites-available/triage-insight
# Enable:   sudo ln -s /etc/nginx/sites-available/triage-insight /etc/nginx/sites-enabled/
#
# Replace YOUR_DOMAIN with your actual domain (e.g. app.triage-insight.com).
# SSL is handled by CloudFront — Nginx only needs to handle HTTP on the
# Lightsail instance (CloudFront terminates HTTPS and forwards HTTP).
# ─────────────────────────────────────────────────────────────────────────────

# ── API: api.triage-insight.com (or /api/* path on CloudFront) ───────────────
server {
    listen 80;
    server_name api.YOUR_DOMAIN;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Increase body size for CSV uploads
    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}

# ── Web: app.triage-insight.com ───────────────────────────────────────────────
server {
    listen 80;
    server_name app.YOUR_DOMAIN;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
