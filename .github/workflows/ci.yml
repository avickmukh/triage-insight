name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Provide a minimal DATABASE_URL so Prisma can generate the client
  # (actual DB connection is not needed for type-check / lint)
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"

jobs:
  # ─── Frontend (Next.js) ──────────────────────────────────────────────────────
  web-type-check:
    name: "Frontend – TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: TypeScript check (frontend)
        run: pnpm type-check

  web-lint:
    name: "Frontend – ESLint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint (frontend)
        run: pnpm lint:check

  # ─── Backend (NestJS) ────────────────────────────────────────────────────────
  api-type-check:
    name: "Backend – TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: TypeScript check (backend)
        run: pnpm type-check

  api-lint:
    name: "Backend – ESLint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Lint check (backend)
        run: pnpm lint:check
