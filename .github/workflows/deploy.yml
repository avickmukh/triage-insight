name: Deploy to AWS (Single-Box Lightsail)

# ─────────────────────────────────────────────────────────────────────────────
# Architecture: Single Lightsail instance ($20/mo, 4 GB RAM)
#   All services run via Docker Compose on one box:
#   nginx → web (Next.js) + api (NestJS) + worker (BullMQ)
#   + postgres + redis (self-hosted containers)
#
# Triggers:
#   • Push to main        → full build + deploy
#   • workflow_dispatch   → manual deploy with optional tag override
#
# Pipeline:
#   build  → build 3 images in parallel, push to ECR
#   deploy → SSH into Lightsail, pull images, run migrations, restart app containers
#   cdn    → invalidate CloudFront cache
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID          — IAM user with ECR push + CloudFront invalidation
#   AWS_SECRET_ACCESS_KEY      — IAM user secret
#   AWS_REGION                 — e.g. us-east-1
#   ECR_REGISTRY               — e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com
#   LIGHTSAIL_HOST             — Public IP of the Lightsail instance
#   LIGHTSAIL_SSH_KEY          — Private SSH key (PEM), base64-encoded
#                                  Encode: cat lightsail.pem | base64 | tr -d '\n'
#   CLOUDFRONT_DISTRIBUTION_ID — e.g. E1ABCDEF123456
#   NEXT_PUBLIC_API_BASE_URL   — e.g. https://app.yourdomain.com/api/v1
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (leave blank to use commit SHA)"
        required: false
        default: ""

env:
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_TAG:    ${{ github.event.inputs.image_tag || github.sha }}

jobs:
  # ── Build & push all three Docker images ──────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API ────────────────────────────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/api/Dockerfile
          push:       true
          tags: |
            ${{ env.ECR_REGISTRY }}/triage-insight-api:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/triage-insight-api:latest
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

      # ── Worker ────────────────────────────────────────────────────────────
      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/worker/Dockerfile
          push:       true
          tags: |
            ${{ env.ECR_REGISTRY }}/triage-insight-worker:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/triage-insight-worker:latest
          cache-from: type=gha,scope=worker
          cache-to:   type=gha,scope=worker,mode=max

      # ── Web ───────────────────────────────────────────────────────────────
      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/web/Dockerfile
          push:       true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          tags: |
            ${{ env.ECR_REGISTRY }}/triage-insight-web:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/triage-insight-web:latest
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max

  # ── Deploy to Lightsail via SSH ────────────────────────────────────────────
  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy via SSH
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          SSH_KEY:        ${{ secrets.LIGHTSAIL_SSH_KEY }}
          REGISTRY:       ${{ env.ECR_REGISTRY }}
          IMAGE_TAG:      ${{ env.IMAGE_TAG }}
          AWS_REGION:     ${{ env.AWS_REGION }}
        run: |
          # Write and secure the SSH key
          echo "$SSH_KEY" | base64 -d > /tmp/ls_key
          chmod 600 /tmp/ls_key

          # Copy updated compose file and nginx config to the instance
          scp -i /tmp/ls_key -o StrictHostKeyChecking=no \
            docker-compose.production.yml \
            ubuntu@${LIGHTSAIL_HOST}:/home/ubuntu/triage-insight/

          scp -i /tmp/ls_key -o StrictHostKeyChecking=no \
            infra/lightsail/nginx-docker.conf \
            ubuntu@${LIGHTSAIL_HOST}:/home/ubuntu/triage-insight/infra/lightsail/

          scp -i /tmp/ls_key -o StrictHostKeyChecking=no \
            infra/lightsail/deploy.sh \
            ubuntu@${LIGHTSAIL_HOST}:/home/ubuntu/triage-insight/infra/lightsail/

          # Execute the deploy script on the instance
          ssh -i /tmp/ls_key -o StrictHostKeyChecking=no \
            ubuntu@${LIGHTSAIL_HOST} \
            "chmod +x /home/ubuntu/triage-insight/infra/lightsail/deploy.sh && \
             REGISTRY=${REGISTRY} IMAGE_TAG=${IMAGE_TAG} AWS_REGION=${AWS_REGION} \
             bash /home/ubuntu/triage-insight/infra/lightsail/deploy.sh"

          rm -f /tmp/ls_key

  # ── Invalidate CloudFront cache ────────────────────────────────────────────
  cdn:
    name: Invalidate CloudFront
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✓ CloudFront cache invalidated"
